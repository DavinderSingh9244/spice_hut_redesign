<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Hut | Authentic Indian Cuisine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        h1 {
            font-family: 'Playfair Display', serif;
        }

        /* Increased font size and improved hit area for testing compliance */
        .nav-link {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1.1rem;
            /* Increased from 0.75rem */
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #D1D5DB;
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="bg-[#D8C8BB]">

    <section class="relative h-screen w-full overflow-hidden">

        <img src="images/spices-image.jpg" class="absolute w-full h-full object-cover">

        <div class="absolute w-full h-full bg-black/40"></div>

        <nav class="relative z-20 flex justify-between items-center px-16 py-10 text-white">

            <div class="flex space-x-12 nav-link">
                <a href="reservation.html">Reservations</a>
                <a href="menu.html">Menu</a>
            </div>

            <div class="text-center">
                <a href="index.html">
                    <img src="images/spice-hut-logo.png"
                        class="h-28 w-auto transform hover:scale-105 transition duration-300">
                </a>
            </div>

            <div class="flex space-x-12 nav-link items-center">
                <a href="gallery.html">Gallery</a>
                <a href="about.html">About</a>

                <a href="index.html" class="bg-white rounded-full p-3 hover:bg-gray-200 transition shadow-lg">
                    <img src="images/home.png" class="w-6 h-6"> </a>
            </div>

        </nav>

        <div class="relative z-10 h-full flex items-center justify-center">

            <div class="w-full max-w-5xl flex items-center justify-between text-white px-6">

                <div onclick="window.location.href='reservation.html'" class="w-1/2 text-center group cursor-pointer">
                    <div
                        class="bg-black/30 backdrop-blur-sm py-16 rounded-sm border border-white/10 transition duration-500 group-hover:bg-[#990D35]/80">
                        <h1 class="text-6xl md:text-8xl font-bold italic tracking-tighter uppercase">Book</h1>
                        <p class="text-xs uppercase tracking-[0.3em] mt-2 opacity-90 font-bold">Reserve a Table</p>
                    </div>
                </div>

                <div class="h-32 w-[1px] bg-white/30 mx-8"></div>

                <div onclick="window.location.href='menu.html'" class="w-1/2 text-center group cursor-pointer">
                    <div
                        class="bg-black/30 backdrop-blur-sm py-16 rounded-sm border border-white/10 transition duration-500 group-hover:bg-[#990D35]/80">
                        <h1 class="text-6xl md:text-8xl font-bold italic tracking-tighter uppercase">Order</h1>
                        <p class="text-xs uppercase tracking-[0.3em] mt-2 opacity-90 font-bold">View the Menu</p>
                    </div>
                </div>

            </div>

        </div>

    </section>

    <footer class="bg-[#990D35] text-white text-center py-12">
        <p class="text-xs uppercase tracking-[0.5em] font-bold">Spice Hut | Authentic Indian Cuisine | © 2026</p>
    </footer>

</body>

</html>
